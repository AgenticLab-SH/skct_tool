<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKCT 고급 기능 인증</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f8fafc;
            --panel: #ffffff;
            --line: #dbe2ea;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .panel {
            max-width: 420px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin: 0 0 6px;
            font-size: 22px;
        }
        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
            font-size: 13px;
        }
        .stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 12px;
            font-weight: 700;
            color: #334155;
        }
        input, textarea, pre {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            font: inherit;
            background: #fff;
            color: var(--text);
        }
        textarea {
            min-height: 108px;
            resize: vertical;
        }
        pre {
            min-height: 168px;
            white-space: pre-wrap;
            word-break: break-word;
            background: #f8fafc;
            font-size: 12px;
            line-height: 1.5;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            border: none;
            border-radius: 12px;
            padding: 11px 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .primary {
            background: var(--accent);
            color: white;
        }
        .primary:hover { background: var(--accent-dark); }
        .ghost {
            background: #e2e8f0;
            color: #334155;
        }
        .section {
            border-top: 1px solid #e2e8f0;
            padding-top: 14px;
        }
        .hidden { display: none !important; }
        .status {
            font-size: 12px;
            color: var(--muted);
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="panel stack">
        <div>
            <h1>고급 기능 인증</h1>
            <p>신청 이메일 또는 로그인 ID와 비밀번호를 확인한 뒤 실제 팝업 웹의 고급 기능 버전으로 전환됩니다. 신청번호는 로그인에 쓰지 않습니다.</p>
        </div>

        <section id="authSection" class="stack">
            <div class="field">
                <label for="advancedIdInput">신청 이메일 또는 로그인 ID</label>
                <input id="advancedIdInput" type="text" autocomplete="off">
            </div>
            <div class="field">
                <label for="advancedPasswordInput">비밀번호</label>
                <input id="advancedPasswordInput" type="password" autocomplete="off">
            </div>
            <div class="actions">
                <button id="advancedLoginBtn" class="primary" type="button">확인</button>
            </div>
            <div id="authStatus" class="status"></div>
        </section>
    </div>

    <script>
        const bridge = window.opener && window.opener.SKCTAdvancedBridge;
        const authStatus = document.getElementById('authStatus');
        const idInput = document.getElementById('advancedIdInput');
        const passwordInput = document.getElementById('advancedPasswordInput');
        const loginButton = document.getElementById('advancedLoginBtn');
        const syncReadyState = () => {
            if (!bridge) return;
            if (bridge.isConfigReady && !bridge.isConfigReady()) {
                authStatus.textContent = '원본 창에서 고급 구독 정보를 불러오는 중입니다.';
                loginButton.disabled = true;
                return false;
            }
            loginButton.disabled = false;
            if (!authStatus.textContent || authStatus.textContent.includes('불러오는 중')) {
                authStatus.textContent = '';
            }
            return true;
        };

        if (!bridge) {
            authStatus.textContent = '원본 창과 연결되지 않아 사용할 수 없습니다.';
            loginButton.disabled = true;
        } else {
            syncReadyState();
            window.setInterval(syncReadyState, 500);
        }

        loginButton.addEventListener('click', async () => {
            if (!bridge) return;
            if (!syncReadyState()) return;
            const loginId = idInput.value.trim();
            const password = passwordInput.value.trim();
            authStatus.textContent = '신청 이메일 또는 로그인 ID와 비밀번호를 확인하고 있습니다.';
            const result = bridge.validateCredentialsDetailed
                ? await bridge.validateCredentialsDetailed(loginId, password)
                : bridge.validatePasswordDetailed
                    ? await bridge.validatePasswordDetailed(password)
                    : { ok: await bridge.validatePassword(password), reason: 'invalid' };
            if (!result.ok) {
                authStatus.textContent = result.reason === 'expired'
                    ? '이메일 또는 로그인 ID와 비밀번호는 맞지만 이용권이 만료되었거나 비활성화되었습니다.'
                    : result.reason === 'empty_password'
                        ? '비밀번호를 입력해주세요.'
                        : result.reason === 'empty'
                            ? '신청 이메일 또는 로그인 ID와 비밀번호를 모두 입력해주세요.'
                            : '이메일 또는 로그인 ID / 비밀번호가 일치하지 않습니다.';
                if (!loginId) {
                    idInput.select();
                } else {
                    passwordInput.select();
                }
                return;
            }
            const launch = bridge.activateAdvancedSession();
            authStatus.textContent = '고급 버전 팝업 웹으로 전환 중입니다.';
            window.name = launch.popupName;
            window.location.replace(launch.targetUrl);
        });

        idInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                loginButton.click();
            }
        });
        passwordInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                loginButton.click();
            }
        });
    </script>
</body>
</html>
