<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 점검 중</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 500px;
            width: 90%;
            border-top: 5px solid #3b82f6;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .icon {
            font-size: 40px;
            margin-bottom: 20px;
            display: block;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .highlight {
            font-weight: bold;
            color: #ef4444;
            background: #fef2f2;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 18px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">🚧</span>
        <h1>서버 업데이트 중입니다</h1>
        <p>더 나은 서비스를 제공하기 위해 현재 시스템을 점검 및 업데이트하고 있습니다.</p>
        <p id="finishTimeText">예상 완료 일시: <span class="highlight">4월 5일 11:00</span></p>
        <p style="font-size: 14px; margin-top: 30px; color: #94a3b8;">
            이용에 불편을 드려 죄송합니다. <br>
            점검이 완료되는 대로 알림 없이 사이트 접속이 가능해집니다.
        </p>
        <a href="index.html" class="btn">새로고침</a>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const devParam = urlParams.get('dev');
        const previewParam = urlParams.get('preview');
        const timeParam = urlParams.get('time');

        if (devParam === '1') {
            const nextParams = new URLSearchParams();
            nextParams.set('dev', '1');
            if (previewParam === '1') {
                nextParams.set('preview', '1');
            }
            window.location.replace(`index.html?${nextParams.toString()}`);
        }

        if (timeParam) {
            document.querySelector('.highlight').textContent = timeParam;
        }
    </script>
</body>
</html>
